name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > /tmp/release_notes.md

      - name: Build
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm build

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --notes-file /tmp/release_notes.md

      - name: Publish to npm
        if: steps.tag_check.outputs.exists == 'false'
        run: pnpm publish --no-git-checks --access public
        env:
          NPM_CONFIG_PROVENANCE: true
